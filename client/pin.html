<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Enter PIN — KhataBook</title>
  <meta name="description" content="Enter your 4-digit security PIN to access KhataBook" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>" />
  <style>
    .attempts-indicator {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: -16px;
      margin-bottom: 20px;
    }
    .attempt-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent-red);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .attempt-dot.used { opacity: 1; }
    .lock-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s ease infinite;
    }
    .logout-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.8125rem;
      cursor: pointer;
      text-decoration: underline;
      transition: var(--transition-fast);
    }
    .logout-link:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="page-center">
    <div class="container">
      <div class="card animate-fade-in-up" style="max-width: 400px; margin: 0 auto; text-align: center;">

        <!-- Top bar with logo and language selector -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;">📒</div>
            <span style="font-weight: 800; font-size: 1.15rem; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" data-i18n="appTitle">KhataBook</span>
          </div>
          <div id="langContainer"></div>
        </div>

        <!-- User info -->
        <div id="userSection">
          <div class="spinner" style="width:32px;height:32px;margin:0 auto;"></div>
        </div>

        <!-- Lock icon & title -->
        <span class="lock-icon" style="margin-top: 20px;">🔐</span>
        <h1 style="font-size: 1.5rem; margin-bottom: 8px;" data-i18n="welcomeBack">Welcome back!</h1>
        <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0;" data-i18n="enterPinDesc">
          Enter your 4-digit PIN to continue
        </p>

        <!-- PIN Input -->
        <div class="pin-container" id="pinContainer">
          <input class="pin-box" id="pin1" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
          <input class="pin-box" id="pin2" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
          <input class="pin-box" id="pin3" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
          <input class="pin-box" id="pin4" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        </div>

        <!-- Wrong attempts -->
        <div class="attempts-indicator" id="attemptsIndicator">
          <div class="attempt-dot" id="dot0"></div>
          <div class="attempt-dot" id="dot1"></div>
          <div class="attempt-dot" id="dot2"></div>
        </div>

        <!-- Alert -->
        <div class="alert alert-error" id="errorAlert" style="display:none;">
          <span>⚠</span>
          <span id="errorMsg">Incorrect PIN. Please try again.</span>
        </div>
        <div class="alert alert-success" id="successAlert" style="display:none;">
          <span>✓</span>
          <span>PIN verified! Opening your KhataBook...</span>
        </div>

        <!-- Security note -->
        <div style="margin-top: 24px; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <span style="font-size: 0.75rem; color: var(--text-muted);" data-i18n="pinSecuredNote">🔒 Secured with end-to-end encryption</span>
        </div>

        <!-- Logout link -->
        <a class="logout-link" onclick="logout()" data-i18n="notYouLogout">Not you? Sign out</a>

      </div>
    </div>
  </div>

  <script src="/js/translations.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    renderLangSelector('langContainer');
    let wrongAttempts = 0;
    const MAX_ATTEMPTS = 3;

    const pinInputs = [
      document.getElementById('pin1'),
      document.getElementById('pin2'),
      document.getElementById('pin3'),
      document.getElementById('pin4'),
    ];

    // Load user info
    (async () => {
      const user = await getAuthUser();
      if (!user) { window.location.replace('/index.html'); return; }
      if (!user.pinSet) { window.location.replace('/setup-pin.html'); return; }
      if (user.pinVerified) { window.location.replace('/dashboard.html'); return; }

      document.getElementById('userSection').innerHTML = `
        <img src="${user.avatar}" alt="${user.name}" class="avatar avatar-lg" style="margin: 0 auto; display:block;" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=0D8ABC&color=fff'" />
        <div style="font-weight:700; font-size:1rem; margin-top: 10px;">${user.name}</div>
        <div style="color:var(--text-secondary); font-size:0.8125rem;">${user.email}</div>
      `;

      // Focus first input after render
      setTimeout(() => pinInputs[0].focus(), 100);
    })();

    // Auto-submit when all 4 digits are filled
    setupPinInputs(pinInputs, () => {
      verifyPin();
    });

    async function verifyPin() {
      hideAlerts();
      const pin = pinInputs.map(i => i.value).join('');
      if (pin.length !== 4) return;

      // Disable inputs during verification
      pinInputs.forEach(i => i.disabled = true);

      try {
        const res = await fetch('/api/auth/verify-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ pin }),
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('khatabook_pin_verified', 'true');
          pinInputs.forEach(i => { i.classList.add('filled'); });
          const success = document.getElementById('successAlert');
          success.style.display = 'flex';
          setTimeout(() => success.classList.add('show'), 10);
          setTimeout(() => window.location.replace('/dashboard.html'), 1200);
        } else {
          wrongAttempts++;
          // Mark attempt dot
          const dot = document.getElementById(`dot${wrongAttempts - 1}`);
          if (dot) dot.classList.add('used');

          pinInputs.forEach(i => {
            i.classList.add('error');
            i.disabled = false;
          });
          setTimeout(() => {
            pinInputs.forEach(i => { i.classList.remove('error'); i.value = ''; i.classList.remove('filled'); });
            pinInputs[0].focus();
          }, 500);

          if (wrongAttempts >= MAX_ATTEMPTS) {
            showError('Too many wrong attempts. Logging you out for security.');
            setTimeout(() => logout(), 2500);
          } else {
            showError(`Incorrect PIN. ${MAX_ATTEMPTS - wrongAttempts} attempt(s) remaining.`);
          }
        }
      } catch (e) {
        showError('Network error. Please check your connection.');
        pinInputs.forEach(i => i.disabled = false);
        pinInputs[0].focus();
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorAlert');
      document.getElementById('errorMsg').textContent = msg;
      el.style.display = 'flex';
      setTimeout(() => el.classList.add('show'), 10);
    }
    function hideAlerts() {
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('errorAlert').classList.remove('show');
    }

    async function logout() {
      sessionStorage.removeItem('khatabook_pin_verified');
      await fetch('/api/auth/logout', { credentials: 'include' });
      window.location.replace('/index.html');
    }
  </script>
</body>
</html>
