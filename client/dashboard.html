<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dashboard — KhataBook</title>
  <meta name="description" content="KhataBook Dashboard — manage all your contacts and balances" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>" />
  <style>
    .user-menu {
      position: relative;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 8px;
      min-width: 200px;
      box-shadow: var(--shadow-lg);
      display: none;
      z-index: 200;
    }
    .dropdown.open { display: block; animation: fadeInUp 0.2s ease; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text-secondary);
      transition: var(--transition-fast);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .dropdown-item:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    .dropdown-item.danger:hover { color: var(--accent-red); }
    .contact-count-badge {
      background: rgba(0,212,170,0.15);
      color: var(--accent-green);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(0,212,170,0.25);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div style="display:flex; align-items:center; gap: 10px;">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent-green),var(--accent-blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;">📒</div>
      <span style="font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,var(--accent-green),var(--accent-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" data-i18n="appTitle">KhataBook</span>
    </div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div id="langContainer"></div>
      <div class="user-menu" id="userMenu">
        <img src="" alt="User" class="avatar" id="userAvatar" style="cursor:pointer;" onclick="toggleDropdown()" />
        <div class="dropdown" id="dropdown">
          <div style="padding:10px 14px 8px; border-bottom: 1px solid var(--border-color); margin-bottom: 6px;">
            <div style="font-weight:700; font-size:0.875rem;" id="dropdownName">—</div>
            <div style="color:var(--text-secondary); font-size:0.75rem;" id="dropdownEmail">—</div>
          </div>
          <button class="dropdown-item danger" onclick="logout()">
            <span>🚪</span> <span data-i18n="signOut">Sign Out</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container" style="padding-bottom: 100px;">

    <!-- Loading state -->
    <div id="loadingState">
      <div class="spinner"></div>
    </div>

    <!-- Dashboard content -->
    <div id="dashboardContent" style="display:none;">

      <!-- Greeting -->
      <div style="padding: 24px 4px 8px;" id="greeting">
        <h2 style="font-size:1.375rem; font-weight:800;" id="greetingText">Good <span id="timeOfDay">day</span>! 👋</h2>
        <p style="color:var(--text-secondary); font-size:0.875rem; margin-top:4px;" data-i18n="financialOverview">Here's your financial overview</p>
      </div>

      <!-- Net Balance Hero -->
      <div class="net-balance-hero animate-fade-in-up">
        <div class="net-balance-label" data-i18n="netBalance">Net Balance</div>
        <div class="net-balance-amount" id="netBalanceAmount">₹0</div>
        <div id="netBalanceLabel" style="margin-top:10px; font-size:0.875rem; color: var(--text-secondary);"></div>
      </div>

      <!-- Balance Summary Cards -->
      <div class="balance-section animate-fade-in-up animate-delay-1">
        <div class="balance-card green">
          <div class="balance-label" data-i18n="youWillGet">You'll Get</div>
          <div class="balance-amount text-green">₹<span id="totalGet">0</span></div>
        </div>
        <div class="balance-card red">
          <div class="balance-label" data-i18n="youWillGive">You'll Give</div>
          <div class="balance-amount text-red">₹<span id="totalGive">0</span></div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrapper animate-fade-in-up animate-delay-2">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search contacts..." data-i18n-placeholder="searchPlaceholder" oninput="filterContacts()" />
      </div>

      <!-- Contact List -->
      <div class="section-header animate-fade-in-up animate-delay-3">
        <span class="section-title" data-i18n="contactsHeader">Contacts</span>
        <span class="contact-count-badge" id="contactCount">0</span>
      </div>

      <!-- Contacts -->
      <div class="contact-list" id="contactList"></div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">👥</div>
        <div class="empty-title" data-i18n="noContactsTitle">No contacts yet</div>
        <div class="empty-desc" data-i18n="noContactsDesc">Tap the + button to add your first contact</div>
      </div>

    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddContact()" title="Add Contact">+</button>

  <!-- Add Contact Modal -->
  <div class="modal-overlay" id="addContactModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 style="margin-bottom: 20px;" data-i18n="addContactTitle">Add New Contact</h3>
      <div class="form-group">
        <label class="form-label" data-i18n="nameLabel">Name *</label>
        <input type="text" class="form-input" id="contactName" placeholder="Enter contact name" data-i18n-placeholder="namePlaceholder" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="phoneLabel">Phone (optional)</label>
        <input type="tel" class="form-input" id="contactPhone" placeholder="+91 99999 99999" data-i18n-placeholder="phonePlaceholder" />
      </div>
      <div class="alert alert-error" id="addContactError" style="display:none; margin-bottom:16px;">
        <span>⚠</span> <span id="addContactErrorMsg">Name is required.</span>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn btn-ghost" onclick="closeAddContact()" data-i18n="cancel">Cancel</button>
        <button class="btn btn-primary" onclick="addContact()" data-i18n="addContactBtn">Add Contact</button>
      </div>
    </div>
  </div>

  <script src="/js/translations.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    renderLangSelector('langContainer');
  </script>
</body>
</html>
